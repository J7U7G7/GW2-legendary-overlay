name: Release

on:
  push:
    tags:
      - "v*"

# Allow the workflow to create / update releases.
permissions:
  contents: write

jobs:
  build-windows:
    name: Build MSI + NSIS installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      # `npm run tauri build` runs `vite build` via the beforeBuildCommand
      # hook in tauri.conf.json, then `cargo build --release`, then bundles
      # via tauri-bundler (MSI + NSIS by default on Windows).
      - name: Tauri build
        run: npm run tauri build

      - name: Upload installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false

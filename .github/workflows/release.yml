name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build MSI + NSIS installers (signed) + latest.json
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      # The Tauri build picks up TAURI_SIGNING_PRIVATE_KEY and signs every
      # bundle. The password env is hardcoded to empty here because the
      # key was generated with `--password ""` (no encryption). A non-empty
      # value would make minisign reject the key and silently skip the NSIS
      # bundle, breaking the manifest gen step downstream.
      - name: Tauri build (signs MSI + NSIS bundles)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build

      # Diagnostic listing so future failures surface what was actually
      # produced before the manifest step tries to find specific files.
      - name: List bundle output
        if: always()
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          if (Test-Path $bundleRoot) {
            Get-ChildItem -Recurse $bundleRoot | Select-Object FullName, Length
          } else {
            Write-Host "No bundle directory at $bundleRoot"
          }

      # Pluck the just-built NSIS .exe + its .sig and assemble the
      # manifest the auto-updater fetches. Tauri's updater honours either
      # MSI or NSIS; we point at NSIS because it supports `passive` install
      # mode (no UAC prompt nag on every update).
      - name: Generate latest.json manifest
        id: manifest
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem -Path $bundleDir -Filter "*-setup.exe" | Select-Object -First 1
          $sig = Get-ChildItem -Path $bundleDir -Filter "*-setup.exe.sig" | Select-Object -First 1
          if (-not $exe -or -not $sig) {
            Write-Error "NSIS installer or signature not found in $bundleDir"
            exit 1
          }
          $signature = Get-Content $sig.FullName -Raw
          $assetUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$($exe.Name)"
          $manifest = @{
            version   = $version
            notes     = "See the release page for details."
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url       = $assetUrl
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 6 | Out-File -FilePath "latest.json" -Encoding utf8
          Write-Host "=== latest.json ==="
          Get-Content latest.json
          Write-Host "==================="
          Write-Host "exe=$($exe.FullName)"
          Write-Host "exeName=$($exe.Name)"

      - name: Upload installers + manifest to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

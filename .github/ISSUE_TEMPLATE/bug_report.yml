name: 🐛 Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Filling the fields below speeds up
        diagnosis a lot — the **logs** field in particular usually
        contains the answer.

  - type: input
    id: version
    attributes:
      label: App version
      description: From Settings → bottom of the panel, or the installer file name.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 Pro 23H2"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What did you expect, what happened instead, steps to reproduce.
      placeholder: |
        1. Open the app
        2. Click ...
        3. Expected ... but saw ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Recent logs
      description: |
        In the app: **Settings → Diagnostics → Copy last logs**.
        Paste here. (Scrub anything sensitive — the app does not log
        your API key, but feel free to double-check.)
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: I'm running the latest release I can find.
          required: false
        - label: I searched existing issues and didn't find a duplicate.
          required: true
